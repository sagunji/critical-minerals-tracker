name: Sync Data Sources

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 08:00 UTC
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Sync NRCan
        working-directory: apps/api
        run: uv run python scripts/sync_nrcan.py

      - name: Sync CMIF
        working-directory: apps/api
        run: uv run python scripts/sync_cmif.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet apps/api/src/data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "### Data Changes Detected" >> $GITHUB_STEP_SUMMARY
            git diff --stat apps/api/src/data/ >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create PR if data changed
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          title: "data: refresh from NRCan + Ontario CMIF"
          body: |
            Automated weekly sync detected upstream changes.

            **Review:**
            - `apps/api/src/data/sync_log.json` — NRCan metadata
            - `apps/api/src/data/funding_metadata.json` — CMIF metadata
            - `apps/api/src/data/minerals.json` — project records
            - `apps/api/src/data/funding.json` — funding records
          branch: data/sync-${{ github.run_number }}
          commit-message: "data: sync from upstream sources"
          labels: data,automated
